name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Smart-contract build + tests
  # ──────────────────────────────────────────────
  contracts:
    name: Smart Contracts (Rust / Soroban)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          components: clippy, rustfmt

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run contract unit tests
        run: cargo test

      - name: Build WASM artifacts
        run: cargo build --target wasm32v1-none --release

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasms
          path: contracts/target/wasm32v1-none/release/*.wasm
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 2: Frontend lint + type-check + test + build
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js 14)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests with coverage
        run: npm run test:ci
        env:
          # Provide placeholder values so imports don't fail at test-module load
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_NETWORK_PASSPHRASE: 'Test SDF Network ; September 2015'
          NEXT_PUBLIC_MATCH_REGISTRY_ID: ''
          NEXT_PUBLIC_USDC_CONTRACT_ID: ''

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_NETWORK_PASSPHRASE: 'Test SDF Network ; September 2015'
          NEXT_PUBLIC_API_URL: http://localhost:3000/api
          NEXT_PUBLIC_WS_URL: ws://localhost:3001
          NEXT_PUBLIC_MATCH_REGISTRY_ID: ${{ secrets.NEXT_PUBLIC_MATCH_REGISTRY_ID }}
          NEXT_PUBLIC_ESCROW_VAULT_ID: ${{ secrets.NEXT_PUBLIC_ESCROW_VAULT_ID }}
          NEXT_PUBLIC_PREDICTION_POOL_ID: ${{ secrets.NEXT_PUBLIC_PREDICTION_POOL_ID }}
          NEXT_PUBLIC_ORACLE_GATEWAY_ID: ${{ secrets.NEXT_PUBLIC_ORACLE_GATEWAY_ID }}
          NEXT_PUBLIC_SETTLEMENT_ID: ${{ secrets.NEXT_PUBLIC_SETTLEMENT_ID }}
          NEXT_PUBLIC_USDC_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_USDC_CONTRACT_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: frontend/.next
          retention-days: 3
