name: Deploy

on:
  push:
    branches:
      - main
  # Manual trigger. Ticking "deploy_contracts" is the ONLY way to actually
  # (re)deploy the Soroban contracts — that mints brand-new addresses and wipes
  # on-chain state, so it must never happen automatically on a push.
  workflow_dispatch:
    inputs:
      deploy_contracts:
        description: 'Redeploy smart contracts (mints NEW addresses!)'
        type: boolean
        default: false

# One deploy at a time; cancel an in-progress deploy if a newer push lands.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Known live testnet deployment. Public NEXT_PUBLIC contract IDs — safe to
# embed. Repository variables (vars.*) override them when present.
env:
  MATCH_REGISTRY_ID: ${{ vars.NEXT_PUBLIC_MATCH_REGISTRY_ID || 'CALMF5ALUJ4CQMTQZFPD7IGOYVMOWFWAX2ZUZD45T4S5RTYRSO7KQM27' }}
  ESCROW_VAULT_ID: ${{ vars.NEXT_PUBLIC_ESCROW_VAULT_ID || 'CA2MU6Y6JP5ZYCX44DNVW2IQIXNQWUNTWJUEBPGBQZHR2OW3DJAAJVUB' }}
  PREDICTION_POOL_ID: ${{ vars.NEXT_PUBLIC_PREDICTION_POOL_ID || 'CBN5AFLUV6GFBWTEC7R5EYHQYMLV3O2Y474VGCQIE3CRSXSCIUWM6VIP' }}
  ORACLE_GATEWAY_ID: ${{ vars.NEXT_PUBLIC_ORACLE_GATEWAY_ID || 'CDMSMCWOV22QU5GYFWCNCIZSF646SNBRC46HJUWZMIPSGPOYUWJZDTLU' }}
  SETTLEMENT_ID: ${{ vars.NEXT_PUBLIC_SETTLEMENT_ID || 'CBT5K7PFCV3JCDUVAQZBWYK7YXBXSZ7TKSH2ZMPZC62FALNBAFGGPXYX' }}
  USDC_CONTRACT_ID: ${{ vars.NEXT_PUBLIC_USDC_CONTRACT_ID || 'CBIELTK6YBZJU5UP2WWQEUCYKLPU6AUNZ2BQ4WWFEIE3USCIHMXQDAMA' }}

jobs:
  # ──────────────────────────────────────────────
  # Job 1 — Smart contracts (build WASM + deploy to testnet)
  # ──────────────────────────────────────────────
  deploy-contract:
    name: Deploy Smart Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    outputs:
      match_registry_id: ${{ steps.ids.outputs.match_registry_id }}
      escrow_vault_id: ${{ steps.ids.outputs.escrow_vault_id }}
      prediction_pool_id: ${{ steps.ids.outputs.prediction_pool_id }}
      oracle_gateway_id: ${{ steps.ids.outputs.oracle_gateway_id }}
      settlement_id: ${{ steps.ids.outputs.settlement_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Build WASM artifacts
        run: cargo build --target wasm32v1-none --release

      # Real (re)deploy — only on manual dispatch with the checkbox ticked.
      - name: Install Stellar CLI
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_contracts }}
        run: cargo install --locked stellar-cli --features opt

      - name: Deploy contracts to Stellar testnet
        id: ids
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
        run: |
          set -euo pipefail
          echo "▶ Deploying Soroban contracts to Stellar testnet…"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.deploy_contracts }}" = "true" ]; then
            echo "  Mode: FRESH DEPLOY (manual dispatch) — minting new contract addresses"
            stellar keys add deployer --secret-key <<< "$STELLAR_SECRET_KEY"
            deploy() { stellar contract deploy --wasm "target/wasm32v1-none/release/$1.wasm" --source deployer --network testnet; }
            MR=$(deploy match_registry)
            EV=$(deploy escrow_vault)
            PP=$(deploy prediction_pool)
            OG=$(deploy oracle_gateway)
            ST=$(deploy settlement)
          else
            echo "  Mode: PUSH — contracts already live on testnet, reusing existing deployment."
            echo "  (A fresh redeploy mints NEW addresses + wipes on-chain state; run it"
            echo "   manually via 'Run workflow' → tick 'Redeploy smart contracts'.)"
            MR="$MATCH_REGISTRY_ID"; EV="$ESCROW_VAULT_ID"; PP="$PREDICTION_POOL_ID"
            OG="$ORACLE_GATEWAY_ID"; ST="$SETTLEMENT_ID"
          fi

          echo "match_registry_id=$MR"  >> "$GITHUB_OUTPUT"
          echo "escrow_vault_id=$EV"    >> "$GITHUB_OUTPUT"
          echo "prediction_pool_id=$PP" >> "$GITHUB_OUTPUT"
          echo "oracle_gateway_id=$OG"  >> "$GITHUB_OUTPUT"
          echo "settlement_id=$ST"      >> "$GITHUB_OUTPUT"

          echo ""
          echo "✅ Contract deployment complete — addresses on Stellar testnet:"
          echo "   match_registry:  $MR"
          echo "   escrow_vault:    $EV"
          echo "   prediction_pool: $PP"
          echo "   oracle_gateway:  $OG"
          echo "   settlement:      $ST"

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasms
          path: contracts/target/wasm32v1-none/release/*.wasm
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 2 — Relayer (build + deploy to Render)
  # ──────────────────────────────────────────────
  deploy-relayer:
    name: Deploy Relayer (Render)
    runs-on: ubuntu-latest
    needs: [deploy-contract]
    if: ${{ !failure() && !cancelled() }}
    defaults:
      run:
        working-directory: relayer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build (tsc)
        run: npm run build

      - name: Upload relayer build artifact
        uses: actions/upload-artifact@v4
        with:
          name: relayer-dist
          path: relayer/dist
          retention-days: 3

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "▶ Triggering Render deploy…"
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL")
            echo "Render deploy hook responded: HTTP $code"
            [ "$code" = "200" ] || [ "$code" = "201" ] || { echo "Deploy hook failed"; exit 1; }
            echo "✅ Render deploy triggered."
          else
            echo "ℹ RENDER_DEPLOY_HOOK_URL secret not set — Render auto-deploys from its"
            echo "  GitHub integration on push to main, so no manual trigger needed."
          fi

  # ──────────────────────────────────────────────
  # Job 3 — Frontend (build + deploy to Vercel)
  # ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [deploy-contract, deploy-relayer]
    if: ${{ !failure() && !cancelled() }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_NETWORK_PASSPHRASE: 'Test SDF Network ; September 2015'
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://matefi.onrender.com/api' }}
          NEXT_PUBLIC_WS_URL: ${{ vars.NEXT_PUBLIC_WS_URL || 'wss://matefi.onrender.com' }}
          NEXT_PUBLIC_MATCH_REGISTRY_ID: ${{ needs.deploy-contract.outputs.match_registry_id }}
          NEXT_PUBLIC_ESCROW_VAULT_ID: ${{ needs.deploy-contract.outputs.escrow_vault_id }}
          NEXT_PUBLIC_PREDICTION_POOL_ID: ${{ needs.deploy-contract.outputs.prediction_pool_id }}
          NEXT_PUBLIC_ORACLE_GATEWAY_ID: ${{ needs.deploy-contract.outputs.oracle_gateway_id }}
          NEXT_PUBLIC_SETTLEMENT_ID: ${{ needs.deploy-contract.outputs.settlement_id }}
          NEXT_PUBLIC_USDC_CONTRACT_ID: ${{ env.USDC_CONTRACT_ID }}
          NEXT_PUBLIC_ARBITER_ADDRESS: ${{ vars.NEXT_PUBLIC_ARBITER_ADDRESS }}

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: frontend/.next
          retention-days: 3

      - name: Trigger Vercel deploy
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "▶ Triggering Vercel deploy (deploy hook)…"
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$VERCEL_DEPLOY_HOOK_URL")
            echo "Vercel deploy hook responded: HTTP $code"
            [ "$code" = "200" ] || [ "$code" = "201" ] || { echo "Deploy hook failed"; exit 1; }
            echo "✅ Vercel deploy triggered."
          elif [ -n "$VERCEL_TOKEN" ]; then
            echo "▶ Deploying to Vercel (CLI)…"
            npx --yes vercel --prod --token "$VERCEL_TOKEN" --yes
            echo "✅ Vercel deploy complete."
          else
            echo "ℹ No VERCEL_DEPLOY_HOOK_URL / VERCEL_TOKEN secret set — Vercel auto-deploys"
            echo "  from its GitHub integration on push to main, so no manual trigger needed."
          fi

  # ──────────────────────────────────────────────
  # Job 4 — Post-deploy smoke test
  # ──────────────────────────────────────────────
  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    if: ${{ !failure() && !cancelled() }}

    steps:
      - name: Wait for deployment to stabilise
        run: sleep 20

      - name: Check relayer health
        env:
          API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://matefi.onrender.com/api' }}
        run: |
          echo "GET $API_URL/health"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$API_URL/health" || echo "000")
          echo "Relayer health: HTTP $code"
          # Informational only — a cold Render instance may still be waking up.
          [ "$code" = "200" ] && echo "✅ relayer healthy" || echo "⚠ relayer not 200 (cold start?) — non-blocking"

      - name: Check frontend responds
        env:
          DEPLOY_URL: ${{ vars.DEPLOY_URL || 'https://matefi.vercel.app' }}
        run: |
          echo "GET $DEPLOY_URL"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$DEPLOY_URL" || echo "000")
          echo "Frontend: HTTP $code"
          [ "$code" = "200" ] && echo "✅ frontend up" || echo "⚠ frontend not 200 yet — non-blocking"
