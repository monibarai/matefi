name: Deploy

on:
  push:
    branches:
      - main
  # Manual trigger — the ONLY way to (re)deploy smart contracts.
  # Redeploying mints brand-new contract addresses and wipes on-chain state,
  # so it must never happen automatically on every push.
  workflow_dispatch:
    inputs:
      deploy_contracts:
        description: 'Redeploy smart contracts (mints NEW addresses!)'
        type: boolean
        default: false

# Only one deploy runs at a time; cancel an in-progress deploy if a newer
# push arrives on main.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build and deploy Soroban contracts
  # ──────────────────────────────────────────────
  deploy-contract:
    name: Deploy Smart Contracts
    runs-on: ubuntu-latest
    # Never runs on a normal push. Only when this workflow is dispatched
    # manually with the "deploy_contracts" checkbox ticked.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_contracts }}
    defaults:
      run:
        working-directory: contracts
    outputs:
      # Pass contract IDs to the frontend deploy job via job outputs
      match_registry_id: ${{ steps.deploy-ids.outputs.match_registry_id }}
      escrow_vault_id: ${{ steps.deploy-ids.outputs.escrow_vault_id }}
      prediction_pool_id: ${{ steps.deploy-ids.outputs.prediction_pool_id }}
      oracle_gateway_id: ${{ steps.deploy-ids.outputs.oracle_gateway_id }}
      settlement_id: ${{ steps.deploy-ids.outputs.settlement_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Build WASM artifacts
        run: cargo build --target wasm32v1-none --release

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Configure Stellar network identity
        run: |
          stellar keys add deployer --secret-key
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}

      - name: Deploy match_registry
        id: deploy-match-registry
        run: |
          ID=$(stellar contract deploy \
            --wasm target/wasm32v1-none/release/match_registry.wasm \
            --source deployer \
            --network testnet)
          echo "match_registry_id=$ID" >> "$GITHUB_OUTPUT"
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}

      - name: Deploy escrow_vault
        id: deploy-escrow-vault
        run: |
          ID=$(stellar contract deploy \
            --wasm target/wasm32v1-none/release/escrow_vault.wasm \
            --source deployer \
            --network testnet)
          echo "escrow_vault_id=$ID" >> "$GITHUB_OUTPUT"

      - name: Deploy prediction_pool
        id: deploy-prediction-pool
        run: |
          ID=$(stellar contract deploy \
            --wasm target/wasm32v1-none/release/prediction_pool.wasm \
            --source deployer \
            --network testnet)
          echo "prediction_pool_id=$ID" >> "$GITHUB_OUTPUT"

      - name: Deploy oracle_gateway
        id: deploy-oracle-gateway
        run: |
          ID=$(stellar contract deploy \
            --wasm target/wasm32v1-none/release/oracle_gateway.wasm \
            --source deployer \
            --network testnet)
          echo "oracle_gateway_id=$ID" >> "$GITHUB_OUTPUT"

      - name: Deploy settlement
        id: deploy-settlement
        run: |
          ID=$(stellar contract deploy \
            --wasm target/wasm32v1-none/release/settlement.wasm \
            --source deployer \
            --network testnet)
          echo "settlement_id=$ID" >> "$GITHUB_OUTPUT"

      - name: Collect and expose all contract IDs
        id: deploy-ids
        run: |
          echo "match_registry_id=${{ steps.deploy-match-registry.outputs.match_registry_id }}" >> "$GITHUB_OUTPUT"
          echo "escrow_vault_id=${{ steps.deploy-escrow-vault.outputs.escrow_vault_id }}" >> "$GITHUB_OUTPUT"
          echo "prediction_pool_id=${{ steps.deploy-prediction-pool.outputs.prediction_pool_id }}" >> "$GITHUB_OUTPUT"
          echo "oracle_gateway_id=${{ steps.deploy-oracle-gateway.outputs.oracle_gateway_id }}" >> "$GITHUB_OUTPUT"
          echo "settlement_id=${{ steps.deploy-settlement.outputs.settlement_id }}" >> "$GITHUB_OUTPUT"

      - name: Print deployed contract addresses
        run: |
          echo "=== Deployed Contract Addresses ==="
          echo "match_registry:  ${{ steps.deploy-match-registry.outputs.match_registry_id }}"
          echo "escrow_vault:    ${{ steps.deploy-escrow-vault.outputs.escrow_vault_id }}"
          echo "prediction_pool: ${{ steps.deploy-prediction-pool.outputs.prediction_pool_id }}"
          echo "oracle_gateway:  ${{ steps.deploy-oracle-gateway.outputs.oracle_gateway_id }}"
          echo "settlement:      ${{ steps.deploy-settlement.outputs.settlement_id }}"

  # ──────────────────────────────────────────────
  # Job 2: Build and deploy frontend (Vercel)
  # ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [deploy-contract]
    # Run on every push even though deploy-contract is skipped. Only a real
    # failure/cancellation of the (rare) contract deploy should block us.
    # When contracts aren't redeployed, the build falls back to the existing
    # contract IDs stored in repo secrets.
    if: ${{ !failure() && !cancelled() }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_NETWORK_PASSPHRASE: 'Test SDF Network ; September 2015'
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
          # Use freshly-deployed contract IDs when available, fall back to secrets
          NEXT_PUBLIC_MATCH_REGISTRY_ID: ${{ needs.deploy-contract.outputs.match_registry_id || secrets.NEXT_PUBLIC_MATCH_REGISTRY_ID }}
          NEXT_PUBLIC_ESCROW_VAULT_ID: ${{ needs.deploy-contract.outputs.escrow_vault_id || secrets.NEXT_PUBLIC_ESCROW_VAULT_ID }}
          NEXT_PUBLIC_PREDICTION_POOL_ID: ${{ needs.deploy-contract.outputs.prediction_pool_id || secrets.NEXT_PUBLIC_PREDICTION_POOL_ID }}
          NEXT_PUBLIC_ORACLE_GATEWAY_ID: ${{ needs.deploy-contract.outputs.oracle_gateway_id || secrets.NEXT_PUBLIC_ORACLE_GATEWAY_ID }}
          NEXT_PUBLIC_SETTLEMENT_ID: ${{ needs.deploy-contract.outputs.settlement_id || secrets.NEXT_PUBLIC_SETTLEMENT_ID }}
          NEXT_PUBLIC_USDC_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_USDC_CONTRACT_ID }}

      - name: Deploy to Vercel
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ──────────────────────────────────────────────
  # Job 3: Post-deploy smoke test
  # ──────────────────────────────────────────────
  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    if: ${{ secrets.DEPLOY_URL != '' }}

    steps:
      - name: Wait for deployment to stabilise
        run: sleep 30

      - name: Check frontend responds HTTP 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.DEPLOY_URL }}")
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
